name: Gemini AI Code Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  ai-review:
    runs-on: ubuntu-latest

    # GitHub 的 Environment
    # main -> prod
    # uat -> uat
    # dev -> dev
    environment: >-
      ${{ github.base_ref == 'main' && 'production' || 
          github.base_ref == 'uat'  && 'uat' || 
          'dev' }}

    permissions:
      contents: read
      pull-requests: write # 必須有寫入權限才能貼 comment
      checks: write        # 允許寫入測試檢查結
      id-token: 'write'    # Google WIF
    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 0

      # 1. WIF 認證
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v3'
        with:
          token_format: 'access_token'
          project_id: '${{ vars.GCP_PROJECT_ID }}'
          workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          service_account: '${{ vars.GCP_SERVICE_ACCOUNT }}'

      # 2. 下載環境變數 .env
      - name: Download Environment File from GCS
        run: |-
          # 根據 PR 的目標分支決定環境 (github.base_ref)
          case "${{ github.base_ref }}" in
            "main") TARGET_ENV="prod" ;;
            "uat")  TARGET_ENV="uat" ;;
            "dev")  TARGET_ENV="dev" ;;
            *)      TARGET_ENV="dev" ;;
          esac

          echo "目標分支為 ${{ github.base_ref }}，正在下載 $TARGET_ENV 環境變量..."
          
          # 從 GCS 桶下載
          gcloud storage cp gs://${{ vars.GCP_APP_NAME }}-env-bucket/$TARGET_ENV/.env .env

      # 3. Enable Corepack
      - name: Enable Corepack
        run: corepack enable

      # 4. 設定 Node
      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '24.14.0'
          cache: 'yarn'

      # 5. Trivy v0.36.0 原始碼與依賴庫掃描 (SCA) ==> 應用層
      - name: Run Trivy vulnerability scanner in source code
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        env:
          TRIVY_CACHE_DIR: ${{ runner.temp }}/trivy-cache
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1' # 讓 PR 亮紅燈
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      # 6. 安裝 Gemini
      - name: Install Dependencies
        run: yarn add @google/generative-ai

      - name: Get PR Diff
        id: diff
        run: |
          # 獲取 PR 的改動內容，排除非代碼或鎖定檔
          git diff origin/${{ github.base_ref }}...HEAD -- . ':(exclude)yarn.lock' ':(exclude)*.md' > pr_diff.txt

      # 7. Gemini Code Review
      - name: Run Gemini Review
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_CODE_REVIEWER_MODEL: ${{ vars.GEMINI_CODE_REVIEWER_MODEL }}
          GEMINI_CLI_TRUST_WORKSPACE: true
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node scripts/gemini-reviewer.js pr_diff.txt

      # 8. 清除 Trivy 可能的 Cache (雖然已有 TRIVY_CACHE_DIR，以防萬一)
      - name: Clean Tool Cache Files
        if: always()
        run: rm -rf .cache

      # 9. 更新結果
      - name: Upload Review Result (Optional)
        if: always()
        uses: actions/upload-artifact@v5
        with:
          name: ai-review-log
          path: pr_diff.txt
