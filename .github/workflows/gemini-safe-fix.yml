name: Gemini Safe Bug Fixer
on:
  issues:
    types: [labeled]

jobs:
  # 第一階段：解析環境與分支 (不掛載 Environment，僅做字串處理)
  prepare:
    if: github.event.label.name == 'fix-me'
    runs-on: ubuntu-latest
    outputs:
      ENV_NAME: ${{ steps.set_env.outputs.ENV_NAME }}
      TARGET_BRANCH: ${{ steps.set_env.outputs.TARGET_BRANCH }}
    steps:
      - name: Parse Issue Body
        id: set_env
        run: |
          # 1. 使用 HEREDOC 讀取 Body 並解析分支
          cat << 'EOF' > issue_body.txt
          ${{ github.event.issue.body }}
          EOF

          TARGET_BRANCH=$(grep -A 2 "目標修復環境" issue_body.txt | grep -v "目標修復環境" | grep -v "^$" | head -n 1 | xargs)

          if [ -z "$TARGET_BRANCH" ]; then
            TARGET_BRANCH="main"
          fi

          case "$TARGET_BRANCH" in
            main|uat|dev) ;;
            *)
              echo "::error::不支援的目標分支: $TARGET_BRANCH"
              exit 1
              ;;
          esac

          # 2. 轉換為 GitHub Environment 名稱 (對應你設定的 production/uat/dev)
          if [ "$TARGET_BRANCH" == "main" ]; then
            ENV="production"
          elif [ "$TARGET_BRANCH" == "uat" ]; then
            ENV="uat"
          else
            ENV="dev"
          fi

          echo "解析結果: 分支=$TARGET_BRANCH, 環境=$ENV"
          echo "ENV_NAME=$ENV" >> $GITHUB_OUTPUT
          echo "TARGET_BRANCH=$TARGET_BRANCH" >> $GITHUB_OUTPUT

  # 第二階段：執行 AI 修復任務 (動態掛載正確的 Environment)
  safe_fix:
    needs: [prepare]
    runs-on: ubuntu-latest
    timeout-minutes: 15 # 第一道保險：超過 15 分鐘強制關閉，防止 Runner 燒錢

    # 根據第一階段的輸出，動態綁定環境以取得 WIF 變數
    environment: ${{ needs.prepare.outputs.ENV_NAME }}

    permissions:
      contents: write      # 允許推送代碼 (Branch)
      pull-requests: write # 允許建立 PR
      issues: read         # 允許讀取 Issue 內容
      id-token: 'write'    # Google WIF

    env:
      TARGET_BRANCH: ${{ needs.prepare.outputs.TARGET_BRANCH }}

    steps:
      - name: Checkout Code
        uses: actions/checkout@v5
        with:
          ref: ${{ env.TARGET_BRANCH }} # 使用解析出的變數切換到對應分支

      # 1. WIF 認證
      - id: 'auth'
        name: 'Authenticate to Google Cloud'
        uses: 'google-github-actions/auth@v3'
        with:
          token_format: 'access_token'
          project_id: '${{ vars.GCP_PROJECT_ID }}'
          workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
          service_account: '${{ vars.GCP_SERVICE_ACCOUNT }}'

      # 2. 下載環境變數 .env
      - name: Download Environment File from GCS
        run: |-
          # 根據 PR 的目標分支決定環境 TARGET_BRANCH
          case "${{ env.TARGET_BRANCH }}" in
            "main") TARGET_ENV="prod" ;;
            "uat")  TARGET_ENV="uat" ;;
            "dev")  TARGET_ENV="dev" ;;
            *)      TARGET_ENV="dev" ;;
          esac

          echo "目標分支為 ${{ env.TARGET_BRANCH }}，正在下載 $TARGET_ENV 環境變量..."
          
          # 從 GCS 桶下載
          gcloud storage cp gs://${{ vars.GCP_APP_NAME }}-env-bucket/$TARGET_ENV/.env .env

      # 3. Enable Corepack
      - name: Enable Corepack
        run: corepack enable

      # 4. 設定 Node
      - name: Setup Node.js 
        uses: actions/setup-node@v5
        with:
          node-version: '24.14.0'
          cache: 'yarn'

      # 5. 安裝依賴
      - name: Install Dependencies
        run: |
          yarn install --immutable # CI 環境建議加上 --immutable 確保 yarn.lock 沒被意外變動

      # 6. 安裝 Gemini
      - name: Install Gemini CLI
        run: npm install -g @google/gemini-cli

      # 7. AI 自我修復
      - name: Gemini Auto-Fix with Budget Control
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_AUTO_FIX_MODEL: '${{ vars.GEMINI_AUTO_FIX_MODEL }}'
          GEMINI_CLI_TRUST_WORKSPACE: true
          MAX_RETRIES: 3 # 最多重試 3 次，控制 API 成本
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          attempt=1
          success=false

          while [ $attempt -le $MAX_RETRIES ]; do
            echo "正在進行第 $attempt 次嘗試..."
            
            # 1. 呼叫 Gemini：加入嚴格禁令
            # 增加指令要求僅限修改 src/，且嚴禁修改腳本語法
            gemini -p "這是一個 Next.js 專案。
            請針對 $TARGET_BRANCH 分支修復 Issue #$ISSUE_NUMBER: $ISSUE_TITLE。
            修改完後必須確保 yarn lint 與 yarn build 都能通過。

            【任務目標】：
            1. 根據 Issue 描述的預期結果進行代碼修改。
            2. **修改後必須確保符合專案規範，使 yarn lint 與 yarn build 都能順利通過。**

            【嚴格限制】：
            1. 僅限修改 src/ 目錄下的檔案。
            2. 絕對禁止修改 .github/ 或 scripts/ 目錄下的任何內容。" --model "$GEMINI_AUTO_FIX_MODEL" --yolo || true

            # 2. 【核心保險】：不可改變的目錄
            git checkout "$TARGET_BRANCH" -- .github/ scripts/
            echo "不可改變的目錄，防止 AI 竄改相關配置。"
            
            # 3. 驗證
            if yarn lint && yarn build; then
              echo "修復成功且編譯通過！"
              success=true
              break
            else
              echo "驗證失敗，準備重試..."
            fi
            
            attempt=$((attempt + 1))
          done

          if [ "$success" = true ]; then
            echo "SUCCESS=true" >> $GITHUB_ENV
          else
            echo "修復失敗，已達重試上限。請手動檢查 Issue 或 Log。"
            exit 1
          fi

      # 8. Trivy v0.36.0 原始碼與依賴庫掃描 (SCA) ==> 應用層
      - name: Run Trivy vulnerability scanner in source code
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        env:
          TRIVY_CACHE_DIR: ${{ runner.temp }}/trivy-cache
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1' # 掃描失敗時中止 PR 建立
          ignore-unfixed: true
          severity: 'CRITICAL,HIGH'

      # 9. 清除工具 Cache 與 GCP WIF 暫存憑證，避免被放進 PR。
      - name: Clean Generated Tool Files
        if: always()
        run: rm -rf .cache gha-creds-*.json

      # 10. 建立 PR
      - name: Create Pull Request
        if: env.SUCCESS == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: ${{ env.TARGET_BRANCH }} # 將 PR 的目標指向解析出來的分支
          commit-message: "fix(ai): automatic fix for issue #${{ github.event.issue.number }}"
          title: "AI 修復建議 (${{ env.TARGET_BRANCH }}): ${{ github.event.issue.title }}"
          body: |
            ## AI 自動修復報告
            - **關聯問題**: #${{ github.event.issue.number }}
            - **目標分支**: `${{ env.TARGET_BRANCH }}`
            - **驗證方式**: `yarn lint` & `yarn build` 已通過 ✅
            - **底層模型**: ${{ env.GEMINI_AUTO_FIX_MODEL }}
            
            請檢查 Files Changed，確認邏輯無誤後即可合併。
          branch: gemini-fix-${{ github.event.issue.number }}-${{ env.TARGET_BRANCH }}
          delete-branch: true
