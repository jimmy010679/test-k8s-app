name: Build and Deploy to GKE

on:
  push:
    branches: [ "main" ]
  workflow_dispatch: # 允許手動觸發

env:
  GAR_LOCATION: asia-east1 
  REPOSITORY: test-k8s-app-repo
  IMAGE: my-app
  CLUSTER_NAME: test-k8s-app-cluster
  CLUSTER_LOCATION: asia-east1

jobs:
  setup-build-publish-deploy:
    name: Setup, Build, Publish, and Deploy
    runs-on: ubuntu-latest
    environment: production

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    # 1. WIF 認證 (這部分與你原本的 IaC workflow 類似)
    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v3'
      with:
        token_format: 'access_token'
        workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
        service_account: '${{ vars.GCP_SERVICE_ACCOUNT }}'
        create_credentials_file: true # 1. 產生憑證檔案，這是執行 override 的前提條件

    # 2. 登入 Artifact Registry (讓 Docker 具備推送到 GCP 的權限)
    - name: Docker Auth
      id: docker-auth
      uses: 'docker/login-action@v3'
      with:
        username: 'oauth2accesstoken'
        password: '${{ steps.auth.outputs.access_token }}'
        registry: '${{ env.GAR_LOCATION }}-docker.pkg.dev'

    # 3. 打包並推送 Docker Image
    # 使用 GitHub Run ID 作為 Tag，確保每次部署的 Image 都是唯一的
    - name: Build and Push Container
      run: |-
        docker build -t "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}" .
        docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}"

    # 4. 獲取 GKE 憑證 (連結到你的 K8s 工地)
    - name: Set up GKE credentials
      uses: 'google-github-actions/get-gke-credentials@v2'
      with:
        cluster_name: '${{ env.CLUSTER_NAME }}'
        location: '${{ env.CLUSTER_LOCATION }}'
        project_id: '${{ vars.GCP_PROJECT_ID }}' # 2. 強制指定目標專案
        use_user_project_override: true  # 3. 使用剛才產生的憑證檔案，這會覆蓋預設的 API 檢查行為

    # 5. 部署到 GKE
    # 這裡會先用 sed 把 k8s/deployment.yaml 裡的 Image 標籤換成這次產生的 ${{ github.sha }}
    - name: Deploy to GKE
      run: |-
        # 動態替換 YAML 裡的 Image Tag，這在實務中非常重要
        sed -i 's|image: .*|image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}|g' k8s/deployment.yaml
        kubectl apply -f k8s/
        kubectl rollout status deployment/test-k8s-app-deployment