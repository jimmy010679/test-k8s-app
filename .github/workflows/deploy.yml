name: Build and Deploy to GKE

on:
  push:
    branches: [ "main", "uat", "dev" ] # 監聽三個分支
  workflow_dispatch: # 允許手動觸發

env:
  GAR_LOCATION: asia-east1 
  REPOSITORY: test-k8s-app-repo
  IMAGE: my-app
  CLUSTER_LOCATION: asia-east1

jobs:
  setup-build-publish-deploy:
    name: Setup, Build, Publish, and Deploy
    runs-on: ubuntu-latest
    
    # GitHub 的 Environment
    # main -> prod
    # uat -> uat
    # dev -> dev
    environment: >-
      ${{ github.ref_name == 'main' && 'production' || 
          github.ref_name == 'uat'  && 'uat' || 
          'dev' }}
    env:
      TARGET_NS: ${{ github.ref_name == 'main' && 'prod' || github.ref_name }}
      CLUSTER_NAME: "test-k8s-app-${{ github.ref_name == 'main' && 'prod' || github.ref_name }}-cluster"

    permissions:
      contents: 'read'
      id-token: 'write'

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    # 1. WIF 認證 (這部分與你原本的 IaC workflow 類似)
    - id: 'auth'
      name: 'Authenticate to Google Cloud'
      uses: 'google-github-actions/auth@v3'
      with:
        token_format: 'access_token'
        project_id: '${{ vars.GCP_PROJECT_ID }}'  # 部署目標專案 (不要讓它預設為 SA 所在的 Admin 專案)
        workload_identity_provider: '${{ vars.GCP_WIF_PROVIDER }}'
        service_account: '${{ vars.GCP_SERVICE_ACCOUNT }}'
        create_credentials_file: true # 產生憑證檔案，這是執行 override 的前提條件

    # 2. 登入 Artifact Registry (讓 Docker 具備推送到 GCP 的權限)
    - name: Docker Auth
      id: docker-auth
      uses: 'docker/login-action@v4'
      with:
        username: 'oauth2accesstoken'
        password: '${{ steps.auth.outputs.access_token }}'
        registry: '${{ env.GAR_LOCATION }}-docker.pkg.dev'

    # 3. 打包並推送 Docker Image
    # 使用 GitHub Run ID 作為 Tag，確保每次部署的 Image 都是唯一的
    - name: Build and Push Container
      run: |-
        # 定義環境變數
        REPO_URL="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}"
        
        # 建立兩個標籤：一個是唯一的 SHA，一個是環境標籤 (如 :prod)
        docker build -t "$REPO_URL:${{ github.sha }}" -t "$REPO_URL:$TARGET_NS" .
        
        # 推送兩個標籤
        docker push "$REPO_URL:${{ github.sha }}"
        docker push "$REPO_URL:$TARGET_NS"
        
    # 4. 獲取 GKE 憑證 (連結到你的 K8s 工地)
    - name: Set up GKE credentials
      uses: 'google-github-actions/get-gke-credentials@v3'
      with:
        project_id: '${{ vars.GCP_PROJECT_ID }}' # 指定目標專案
        cluster_name: '${{ env.CLUSTER_NAME }}'
        location: '${{ env.CLUSTER_LOCATION }}'

    # 5. 自動注入密碼
    - name: Inject Database Password
      env:
        SECRET_NAME: "${{ vars.DB_INSTANCE_NAME }}-password"
      run: |
        echo -n "${{ secrets.DB_PASSWORD }}" | gcloud secrets versions add "${SECRET_NAME}" --data-file=-

    # 6. 部署到 GKE
    - name: Deploy to GKE
      run: |-
        # 1. 決定對應的網域 (請將 kyjhome.com 換成你的實際網域)
        if [ "$TARGET_NS" == "prod" ]; then
          DOMAIN="test-k8s-app.kyjhome.com"
        else
          DOMAIN="test-k8s-app-$TARGET_NS.kyjhome.com"
        fi

        echo "Deploying to Namespace: $TARGET_NS"
        echo "Using Domain: $DOMAIN"
        echo "Using Static IP Name: test-k8s-app-$TARGET_NS-static-ip"

        # 2. 確保 Namespace 存在
        kubectl create namespace $TARGET_NS --dry-run=client -o yaml | kubectl apply -f -

        # 3. 替換 Deployment 裡的 Image 路徑
        IMAGE_PATH="${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ vars.GCP_PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}"
        sed -i "s|image: .*|image: $IMAGE_PATH|g" k8s/deployment.yaml

        # 4. 替換 Ingress 裡的靜態 IP 名稱
        sed -i "s|STATIC_IP_NAME|test-k8s-app-$TARGET_NS-static-ip|g" k8s/ingress.yaml
        
        # 5. 替換 Ingress 裡的網域佔位符
        sed -i "s|DOMAIN_NAME_PLACEHOLDER|$DOMAIN|g" k8s/ingress.yaml

        # 6 替換 Certificate 替換憑證裡的網域
        sed -i "s|DOMAIN_NAME_PLACEHOLDER|$DOMAIN|g" k8s/certificate.yaml

        # 7. 替換 HPA 的 Namespace 議題
        sed -i "/namespace:/d" k8s/hpa.yaml

        # 8. 替換 secret-provider 的 GCP_PROJECT_ID + DB_INSTANCE_NAME
        sed -i "s|YOUR_PROJECT_ID|${{ vars.GCP_PROJECT_ID }}|g" k8s/secret-provider.yaml
        sed -i "s|YOUR_DB_INSTANCE_NAME|${{ vars.DB_INSTANCE_NAME }}|g" k8s/secret-provider.yaml

        # 9. 替換 k8s/*.yaml 下所有的 RESOURCE_SUFFIX 換成 環境名
        sed -i "s|RESOURCE_SUFFIX|$TARGET_NS|g" k8s/*.yaml

        # 10. 部署 secret-provider.yaml，確保 secret-provider.yaml 是在 deployment.yaml 前面
        kubectl apply -f k8s/secret-provider.yaml -n $TARGET_NS
   
        # 11. 部署 基礎組件 (Deployment, Service, HPA, Certificate, frontend-config)
        kubectl apply -f k8s/deployment.yaml \
                      -f k8s/service.yaml \
                      -f k8s/hpa.yaml \
                      -f k8s/certificate.yaml \
                      -f k8s/frontend-config.yaml \
                      -n $TARGET_NS

        # 12. 精準等待：直到 Deployment 的 Pod 全部進入 Ready 狀態
        kubectl wait --for=condition=available --timeout=300s deployment/test-k8s-app-$TARGET_NS-deployment -n $TARGET_NS

        # 13. 給 GCP API 多 10 秒的緩衝
        sleep 10

        # 14. 再部署 Ingress
        kubectl apply -f k8s/ingress.yaml -n $TARGET_NS

        # 15. 等待 GKE 分配 IP 給 Ingress，這能確保靜態 IP 真的被認領成功了
        echo "正在等待 GKE 分配靜態 IP..."
        kubectl wait --namespace $TARGET_NS \
          --for=jsonpath='{.status.loadBalancer.ingress[0].ip}' \
          --timeout=300s ingress/test-k8s-app-$TARGET_NS-ingress

        # 16. 成功後印出 IP 確認
        FINAL_IP=$(kubectl get ingress test-k8s-app-$TARGET_NS-ingress -n $TARGET_NS -o jsonpath='{.status.loadBalancer.ingress[0].ip}')
        echo "部署完成！Ingress IP 為: $FINAL_IP"
        