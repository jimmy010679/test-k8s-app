apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name:  test-k8s-app-ingress
  annotations:
    # 告訴 GKE 使用 Google Cloud 的外部負載平衡器
    kubernetes.io/ingress.class: "gce"
spec:
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: test-k8s-app-service # 指向剛剛寫的 Service
            port:
              number: 80