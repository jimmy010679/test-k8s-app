apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-k8s-app-RESOURCE_SUFFIX-deployment
  labels:
    app: test-k8s-app-RESOURCE_SUFFIX
spec:
  replicas: 2 # 跑兩個副本，達成高可用性
  selector:
    matchLabels:
      app: test-k8s-app-RESOURCE_SUFFIX
  template:
    metadata:
      labels:
        app: test-k8s-app-RESOURCE_SUFFIX
    spec:
      serviceAccountName: test-k8s-app-RESOURCE_SUFFIX-sa # Pod 的身分證 (test-k8s-app-prod-sa)
      containers:
      - name: test-k8s-app-container
        # 這裡填入你 Artifact Registry 裡的 Image 路徑
        image: asia-east1-docker.pkg.dev/test-k8s-app-492717/test-k8s-app-repo/my-app:v1
        ports:
        - containerPort: 3000 # 你的程式監聽的 Port
        env:
        - name: DB_PASSWORD # 你的程式會透過這個環境變數讀取密碼
          valueFrom:
            secretKeyRef:
              name: db-password-secret # 必須對應上面 SecretProviderClass 的 secretName
              key: password            # 必須對應上面 SecretProviderClass 的 data key
        resources:
          requests:
            cpu: "1"         # 啟動時預留 1 核心
            memory: "1Gi"    # 啟動時預留 1GB 內存
          limits:
            cpu: "1"         # 最高限制 1 核心
            memory: "1Gi"    # 最高限制 1GB 內存 (避免 OOM)
        startupProbe:
          httpGet:
            path: /healthz
            port: 3000
          failureThreshold: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        volumeMounts:
        - name: db-secret-volume          # 必須對應 volumes 裡的 name
          mountPath: "/mnt/secrets"       # 隨便掛載到一個路徑，只要存在即可觸發同步
          readOnly: true
      volumes:
        - name: db-secret-volume
          csi:
            driver: secrets-store.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "db-secrets-provider"