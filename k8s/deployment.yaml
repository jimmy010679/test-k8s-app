apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-k8s-app-frontend-RESOURCE_SUFFIX-deployment
  labels:
    app: test-k8s-app-frontend-RESOURCE_SUFFIX
    tier: frontend
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: test-k8s-app-frontend-RESOURCE_SUFFIX
      tier: frontend
  template:
    metadata:
      labels:
        app: test-k8s-app-frontend-RESOURCE_SUFFIX
        tier: frontend
    spec:
      serviceAccountName: test-k8s-app-frontend-RESOURCE_SUFFIX-sa # Pod 的身分證 (test-k8s-app-frontend-prod-sa)
      containers:
      - name: test-k8s-app-container
        # 這裡填入你 Artifact Registry 裡的 Image 路徑
        image: asia-east1-docker.pkg.dev/test-k8s-app-492717/test-k8s-app-repo/my-app:v1
        ports:
        - containerPort: 3000 # 你的程式監聽的 Port
        resources:
          requests:
            cpu: "1"         # 啟動時預留 1 核心
            memory: "1Gi"    # 啟動時預留 1GB 內存
          limits:
            cpu: "1"         # 最高限制 1 核心
            memory: "1Gi"    # 最高限制 1GB 內存 (避免 OOM)
        startupProbe:
          httpGet:
            path: /healthz
            port: 3000
          failureThreshold: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /healthz
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 20
        envFrom:
          - configMapRef:
              name: test-k8s-app-RESOURCE_SUFFIX-config
        volumeMounts:
          - mountPath: "/var/secrets"
            name: db-secret-volume
      volumes:
        - name: db-secret-volume
          csi:
            driver: secrets-store-gke.csi.k8s.io
            readOnly: true
            volumeAttributes:
              secretProviderClass: "test-k8s-app-frontend-RESOURCE_SUFFIX-secrets-provider"