apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: test-k8s-app-frontend-RESOURCE_SUFFIX-be-config
  namespace: RESOURCE_SUFFIX
spec:
  healthCheck:
    checkIntervalSec: 15
    port: 3000         # 強制指定檢查 3000
    type: HTTP
    requestPath: /healthz
  securityPolicy: # 綁定 Cloud Armor 策略
    name: "test-k8s-app-frontend-RESOURCE_SUFFIX-block-waf-policy" # 對應 terraform waf_policy name